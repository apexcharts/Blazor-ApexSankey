name: Publish to NuGet (Trusted Publishing)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget-publishing
    if: startsWith(github.event.head_commit.message, 'release:') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message and extract version
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=${LATEST_TAG#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Manual trigger: using latest tag version $VERSION"
          else
            MSG="${{ github.event.head_commit.message }}"
            if echo "$MSG" | grep -qE '^release: [0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(echo "$MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^ ]*' | head -1)
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "Release commit: version $VERSION"
            else
              echo "❌ Commit message must match 'release: X.Y.Z'"
              exit 1
            fi
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Blazor-ApexSankey/Blazor-ApexSankey.csproj

      - name: Build
        run: |
          dotnet build src/Blazor-ApexSankey/Blazor-ApexSankey.csproj \
            --configuration Release \
            --no-restore \
            /p:Version=${{ steps.check.outputs.version }}

      - name: Pack
        run: |
          dotnet pack src/Blazor-ApexSankey/Blazor-ApexSankey.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:Version=${{ steps.check.outputs.version }}

      - name: Publish to NuGet (Trusted Publishing)
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 30

      - name: Create git tag
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
